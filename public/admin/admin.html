<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Restaurante Delicias</title>

    <link rel="stylesheet" href="./css/adminStyle.css">
</head>
<body>

    <!-- ─────────────────────────────────────────────
        PANTALLA DE LOGIN
        Se muestra cuando no hay token guardado.
        Una vez logueado se oculta y aparece el panel.
    ───────────────────────────────────────────── -->
    <section id="pantalla-login">
        <div class="login-box">
            <h1>Panel Admin</h1>
            <p>Restaurante Delicias</p>

            <div class="form-group">
                <label for="login-usuario">Usuario</label>
                <input type="text" id="login-usuario" placeholder="admin">
            </div>

            <div class="form-group">
                <label for="login-password">Contraseña</label>
                <input type="password" id="login-password" placeholder="••••••••">
            </div>

            <p id="login-error" class="error-msg"></p>

            <button id="btn-login">Ingresar</button>
        </div>
    </section>

    <!-- ─────────────────────────────────────────────
        PANEL DE ADMIN
        Se muestra cuando el token es válido.
        Oculto por defecto, se muestra tras el login.
    ───────────────────────────────────────────── -->
    <section id="panel-admin" class="oculto">

        <header class="admin-header">
            <h1>Panel de Administración</h1>
            <button id="btn-logout">Cerrar sesión</button>
        </header>

        <main class="admin-main">

            <!-- Formulario para agregar o editar un plato -->
            <div class="admin-card">
                <h2 id="form-titulo">Agregar Plato</h2>

                <div class="form-group">
                    <label>Nombre</label>
                    <input type="text" id="input-nombre" placeholder="Ej: Milanesa con papas">
                </div>

                <div class="form-group">
                    <label>Descripción</label>
                    <input type="text" id="input-descripcion" placeholder="Ej: Milanesa de ternera...">
                </div>

                <div class="form-group">
                    <label>Precio</label>
                    <input type="number" id="input-precio" placeholder="Ej: 2500">
                </div>

                <div class="form-group">
                    <label>Categoría</label>
                    <input type="text" id="input-categoria" placeholder="Ej: Entradas">
                </div>

                <div class="form-group">
                    <label>Imagen (URL)</label>
                    <input type="text" id="input-imagen" placeholder="https://...">
                </div>

                <div class="form-group form-check">
                    <label>
                        <input type="checkbox" id="input-disponible" checked>
                        Disponible
                    </label>
                    <label>
                        <input type="checkbox" id="input-destacado">
                        Destacado
                    </label>
                </div>

                <p id="form-error" class="error-msg"></p>
                <p id="form-exito" class="exito-msg"></p>

                <div class="form-btns">
                    <button id="btn-guardar">Guardar plato</button>
                    <button id="btn-cancelar" class="oculto">Cancelar</button>
                </div>
            </div>

            <!-- Lista de platos existentes -->
            <div class="admin-card">
                <h2>Platos existentes</h2>
                <div id="lista-platos">
                    <!-- Los platos se cargan dinámicamente -->
                </div>
            </div>

        </main>
    </section>

    <script src="./js/adminMain.js"></script>
    
</body>
</html>
