<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carta Restaurante</title>

    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="./css/styleCss.css">
</head>
<body>

    <header>
        
        <div class="container-logo">
            <a href=""><img src="../img/logo-restaurante.webp" alt="Logo del restaurante"></a>
        </div>

        <nav>
            <!-- El checkbox primero, oculto -->
            <input type="checkbox" id="menu-hamburger">
            
            <!-- El label es el botón visible -->
            <label class="hamburger" for="menu-hamburger">
                <!-- tres líneas del ícono -->
                <span></span>
                <span></span>
                <span></span>
            </label>

            <!-- La lista que se muestra/oculta -->
            <ul class="list-nav">
                <li class="element"><a href="../index.html">Inicio</a></li>
                <li class="element"><a href="../index.html#information">Nosotros</a></li>
                <li class="element"><a href="../index.html#reservation">Reservar</a></li>
            </ul>
        </nav>

    </header>
    
    <main>

        <section id="main" class="container-hero">

            <div class="hero-img">
                <img src="../img/hero-restaurante.jpg" alt="imagen hero">
            </div>

            <div class="hero-txt">
                <p>Menú Restaurante Delicías</p>
            </div>

        </section>

        <div class="separator"></div>

        <section id="container-platos">
            
        </section>

    </main>

    <footer>
        <div class="separator"></div>

        <section class="container-contac ">
            <h3>Restaurante Delicías</h3>

            <div class="container">
                <div class="container-social sec-footer">

                    <h3>Redes Sociales</h3>

                    <div class="social">
                        <a href=""><img src="../img/instagram.png" alt="logo instagram"> @restauranteDelicias</a>
                    </div>

                    <div class="social">
                        <a href=""><img src="../img/whatsapp.png" alt="logo whatsapp"> +54 11 999-999</a>
                    </div>

                    <div class="social">
                        <a href=""><img src="../img/facebook.png" alt="logo facebook">  @restauranteDelicias</a>
                    </div>

                </div>

                <div class="container-street sec-footer">

                    <h3>Ubicación</h3>

                    <div>
                        <p>Localidad tal</p>
                        <p>Sobre la calle tal</p>
                        <p>direccion tal</p>
                    </div>

                </div>
            </div>

        </section>
    </footer>

    <script src="./js/mainCarta.js"></script>
    <script src="../js/nav.js"></script>
</body>
</html>
